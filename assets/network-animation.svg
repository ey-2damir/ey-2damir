<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="360">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="cyanPurple" x1="0" y1="0" x2="1000" y2="0">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FF004D"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 38px;
        font-weight: 800;
        fill: #ffffff;
        letter-spacing: 1px;
      }

      .sub {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 17px;
        font-weight: 700;
        fill: #94a3b8;
        letter-spacing: 2px;
      }

      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        font-weight: 700;
        fill: #e5e7eb;
      }

      .small {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
        font-weight: 700;
        fill: #00F5FF;
      }

      .line {
        stroke: url(#cyanPurple);
        stroke-width: 3;
        stroke-linecap: round;
        opacity: 0.75;
      }

      .dash {
        stroke: #00F5FF;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 8 10;
        animation: dashMove 2.4s linear infinite;
        opacity: 0.85;
      }

      .node {
        fill: #0f172a;
        stroke: #00F5FF;
        stroke-width: 3;
        filter: url(#glow);
      }

      .core {
        fill: #111827;
        stroke: url(#cyanPurple);
        stroke-width: 5;
        filter: url(#glow);
      }

      .packet {
        fill: #00F5FF;
        filter: url(#glow);
      }

      .secure {
        stroke: #22c55e;
        fill: none;
        stroke-width: 3;
        filter: url(#glow);
      }

      @keyframes dashMove {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -180; }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.08); opacity: 1; }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }

      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes blink {
        0%, 100% { opacity: 0.25; }
        50% { opacity: 1; }
      }

      .pulse {
        transform-box: fill-box;
        transform-origin: center;
        animation: pulse 2s ease-in-out infinite;
      }

      .float {
        animation: float 3s ease-in-out infinite;
      }

      .spin {
        transform-box: fill-box;
        transform-origin: center;
        animation: rotate 12s linear infinite;
      }

      .blink1 { animation: blink 1.3s infinite; }
      .blink2 { animation: blink 1.7s infinite; }
      .blink3 { animation: blink 2.1s infinite; }
    </style>
  </defs>

  <rect width="1000" height="360" rx="28" fill="url(#bg)"/>

  <circle cx="130" cy="75" r="120" fill="#00F5FF" opacity="0.05"/>
  <circle cx="860" cy="280" r="150" fill="#FF004D" opacity="0.05"/>
  <circle cx="500" cy="180" r="210" fill="#7C3AED" opacity="0.045"/>

  <text x="500" y="56" text-anchor="middle" class="title">EYAD NETWORK INTELLIGENCE LAB</text>
  <text x="500" y="86" text-anchor="middle" class="sub">CCNA • ROUTING • SWITCHING • AI AGENTS • CYBERSECURITY</text>

  <line x1="230" y1="180" x2="390" y2="130" class="line"/>
  <line x1="230" y1="180" x2="390" y2="230" class="line"/>
  <line x1="610" y1="130" x2="770" y2="180" class="line"/>
  <line x1="610" y1="230" x2="770" y2="180" class="line"/>
  <line x1="390" y1="130" x2="500" y2="180" class="line"/>
  <line x1="390" y1="230" x2="500" y2="180" class="line"/>
  <line x1="610" y1="130" x2="500" y2="180" class="line"/>
  <line x1="610" y1="230" x2="500" y2="180" class="line"/>

  <line x1="230" y1="180" x2="390" y2="130" class="dash"/>
  <line x1="230" y1="180" x2="390" y2="230" class="dash"/>
  <line x1="390" y1="130" x2="500" y2="180" class="dash"/>
  <line x1="390" y1="230" x2="500" y2="180" class="dash"/>
  <line x1="500" y1="180" x2="610" y2="130" class="dash"/>
  <line x1="500" y1="180" x2="610" y2="230" class="dash"/>
  <line x1="610" y1="130" x2="770" y2="180" class="dash"/>
  <line x1="610" y1="230" x2="770" y2="180" class="dash"/>

  <g class="float">
    <rect x="170" y="135" width="120" height="90" rx="18" class="node"/>
    <text x="230" y="174" text-anchor="middle" class="label">SWITCH</text>
    <text x="230" y="197" text-anchor="middle" class="small">VLAN / TRUNK</text>
  </g>

  <g class="float" style="animation-delay:.3s">
    <rect x="340" y="95" width="100" height="70" rx="18" class="node"/>
    <text x="390" y="126" text-anchor="middle" class="label">R1</text>
    <text x="390" y="147" text-anchor="middle" class="small">ROUTER</text>
  </g>

  <g class="float" style="animation-delay:.6s">
    <rect x="340" y="195" width="100" height="70" rx="18" class="node"/>
    <text x="390" y="226" text-anchor="middle" class="label">R2</text>
    <text x="390" y="247" text-anchor="middle" class="small">GATEWAY</text>
  </g>

  <g class="pulse">
    <circle cx="500" cy="180" r="64" class="core"/>
    <circle cx="500" cy="180" r="44" fill="#020617" stroke="#00F5FF" stroke-width="2"/>
    <text x="500" y="174" text-anchor="middle" class="label">AI</text>
    <text x="500" y="196" text-anchor="middle" class="small">NETWORK CORE</text>
  </g>

  <g class="float" style="animation-delay:.9s">
    <rect x="560" y="95" width="100" height="70" rx="18" class="node"/>
    <text x="610" y="126" text-anchor="middle" class="label">IDS</text>
    <text x="610" y="147" text-anchor="middle" class="small">DEFENSE</text>
  </g>

  <g class="float" style="animation-delay:1.2s">
    <rect x="560" y="195" width="100" height="70" rx="18" class="node"/>
    <text x="610" y="226" text-anchor="middle" class="label">LINUX</text>
    <text x="610" y="247" text-anchor="middle" class="small">TOOLS</text>
  </g>

  <g class="float" style="animation-delay:1.5s">
    <rect x="710" y="135" width="120" height="90" rx="18" class="node"/>
    <text x="770" y="174" text-anchor="middle" class="label">CLOUD</text>
    <text x="770" y="197" text-anchor="middle" class="small">PROJECTS</text>
  </g>

  <circle cx="285" cy="163" r="7" class="packet">
    <animateMotion dur="2.6s" repeatCount="indefinite" path="M0 0 L105 -33 L270 17 L485 17"/>
  </circle>

  <circle cx="285" cy="197" r="6" class="packet">
    <animateMotion dur="3.1s" repeatCount="indefinite" path="M0 0 L105 33 L270 -17 L485 -17"/>
  </circle>

  <circle cx="500" cy="180" r="5" fill="#FF004D" filter="url(#glow)">
    <animateMotion dur="3.4s" repeatCount="indefinite" path="M0 0 L110 -50 L270 0"/>
  </circle>

  <circle cx="500" cy="180" r="5" fill="#7C3AED" filter="url(#glow)">
    <animateMotion dur="3.8s" repeatCount="indefinite" path="M0 0 L110 50 L270 0"/>
  </circle>

  <g class="spin">
    <circle cx="500" cy="180" r="86" stroke="#00F5FF" stroke-width="2" stroke-dasharray="12 12" opacity="0.5"/>
    <circle cx="500" cy="94" r="5" fill="#00F5FF" filter="url(#glow)"/>
  </g>

  <g transform="translate(92 270)">
    <path d="M24 18 C24 8 32 2 42 2 C52 2 60 8 60 18 V33 H52 V18 C52 13 48 10 42 10 C36 10 32 13 32 18 V33 H24 V18Z" class="secure"/>
    <rect x="18" y="30" width="48" height="38" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="3" filter="url(#glow)"/>
    <circle cx="42" cy="49" r="5" fill="#22c55e"/>
    <text x="88" y="55" class="label">Secure by mindset, curious by nature</text>
  </g>

  <g transform="translate(785 60)">
    <circle cx="15" cy="15" r="5" fill="#22c55e" class="blink1"/>
    <circle cx="40" cy="15" r="5" fill="#00F5FF" class="blink2"/>
    <circle cx="65" cy="15" r="5" fill="#FF004D" class="blink3"/>
    <text x="0" y="48" class="small">LIVE PACKETS</text>
  </g>

  <text x="500" y="326" text-anchor="middle" class="sub">Building smart systems where networks, security, and AI connect.</text>
</svg>
